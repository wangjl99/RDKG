version: '3.8'

services:
  # ========================================
  # Neo4j Graph Database
  # ========================================
  neo4j:
    image: neo4j:5.15.0
    container_name: rdaccelerate-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/rdaccelerate2024
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=2G
      - NEO4J_dbms_memory_heap_max__size=4G
      - NEO4J_dbms_memory_pagecache_size=2G
      - NEO4J_db_transaction_timeout=10m
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
    volumes:
      - ./neo4j_data:/data
      - ./neo4j_logs:/logs
      - ./neo4j_export:/var/lib/neo4j/import
      - ./neo4j_plugins:/plugins
    restart: unless-stopped
    networks:
      - rdaccelerate-network

  # ========================================
  # Apache Jena Fuseki SPARQL Endpoint
  # ========================================
  fuseki:
    image: stain/jena-fuseki:latest
    container_name: rdaccelerate-fuseki
    ports:
      - "3030:3030"
    environment:
      - ADMIN_PASSWORD=rdaccelerate2024
      - JVM_ARGS=-Xmx4g
    volumes:
      - ./fuseki_data:/fuseki
      - ./rdf_data:/staging
    restart: unless-stopped
    networks:
      - rdaccelerate-network

networks:
  rdaccelerate-network:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_export:
  neo4j_plugins:
  fuseki_data:
  rdf_data:
