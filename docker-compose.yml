version: '3.8'

services:
  # Blazegraph RDF Triplestore
  blazegraph:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rdkg-blazegraph
    ports:
      - "9999:9999"  # Blazegraph web interface
    environment:
      - JAVA_OPTS=-Xmx4g -Xms2g
      - BLAZEGRAPH_PORT=9999
    volumes:
      - blazegraph-data:/var/lib/blazegraph
      - ./data:/data:ro  # Mount data directory as read-only
      - ./logs:/var/log/blazegraph
    restart: unless-stopped
    networks:
      - rdkg-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9999/blazegraph/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Optional: SPARQL Query Interface (Yasgui)
  yasgui:
    image: erikap/yasgui:latest
    container_name: rdkg-yasgui
    ports:
      - "8080:80"
    environment:
      - DEFAULT_SPARQL_ENDPOINT=http://blazegraph:9999/blazegraph/sparql
    depends_on:
      - blazegraph
    networks:
      - rdkg-network
    restart: unless-stopped

  # Optional: RDF Data Loader (runs once to load data)
  data-loader:
    image: openjdk:11-jre-slim
    container_name: rdkg-loader
    volumes:
      - ./data:/data:ro
      - ./scripts:/scripts:ro
    depends_on:
      blazegraph:
        condition: service_healthy
    networks:
      - rdkg-network
    command: >
      sh -c "
        echo 'Waiting for Blazegraph to be ready...' &&
        sleep 30 &&
        echo 'Loading RDF data...' &&
        curl -X POST 
          -H 'Content-Type: text/turtle' 
          --data-binary '@/data/rdkg_complete.ttl' 
          http://blazegraph:9999/blazegraph/sparql &&
        echo 'Data loading completed!'
      "
    restart: "no"

volumes:
  blazegraph-data:
    driver: local

networks:
  rdkg-network:
    driver: bridge

# Usage:
# 1. Start all services: docker-compose up -d
# 2. Access Blazegraph: http://localhost:9999/blazegraph
# 3. Access Yasgui: http://localhost:8080
# 4. Stop services: docker-compose down
# 5. Remove volumes: docker-compose down -v
