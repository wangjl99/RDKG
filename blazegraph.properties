# Blazegraph Configuration for RDKG
# Optimized for rare disease knowledge graph queries

# Journal file location
com.bigdata.journal.AbstractJournal.file=/var/lib/blazegraph/blazegraph.jnl

# Buffer mode (DiskRW for persistent storage)
com.bigdata.journal.AbstractJournal.bufferMode=DiskRW

# Initial journal size (1GB)
com.bigdata.journal.AbstractJournal.initialExtent=1073741824

# Maximum journal size (50GB)
com.bigdata.journal.AbstractJournal.maximumExtent=53687091200

# B-Tree branching factor (higher = better read performance)
com.bigdata.namespace.kb.lex.com.bigdata.btree.BTree.branchingFactor=1024
com.bigdata.namespace.kb.spo.com.bigdata.btree.BTree.branchingFactor=1024

# Enable full text indexing
com.bigdata.rdf.store.AbstractTripleStore.textIndex=true
com.bigdata.rdf.store.AbstractTripleStore.vocabularyClass=com.bigdata.rdf.vocab.NoVocabulary

# Enable geospatial indexing (if needed)
com.bigdata.rdf.store.AbstractTripleStore.geoSpatial=false

# Query optimization settings
com.bigdata.rdf.sparql.ast.QueryHints.analyticMaxMemoryPerQuery=536870912
com.bigdata.rdf.sparql.ast.QueryHints.queryTimeout=300000

# Enable RDF/XML, Turtle, N-Triples support
com.bigdata.rdf.rio.RDFParserOptions.preserveBNodeIDs=true
com.bigdata.rdf.rio.RDFParserOptions.verifyData=true

# Truth maintenance (off for better performance)
com.bigdata.rdf.store.AbstractTripleStore.justify=false
com.bigdata.rdf.store.AbstractTripleStore.axioms=com.bigdata.rdf.axioms.NoAxioms

# Inference mode (None for better query performance)
com.bigdata.rdf.store.AbstractTripleStore.statementIdentifiers=false

# Namespace configuration
com.bigdata.namespace.kb.spo.com.bigdata.btree.BTree.bloomFilter=true

# Query optimizer
com.bigdata.rdf.sail.QueryEngine.optimizer=com.bigdata.rdf.sail.webapp.QueryOptimizer

# Enable SERVICE clause (for federated queries)
com.bigdata.rdf.sparql.ast.QueryHints.runFirstJoinFirst=true

# Performance tuning
com.bigdata.btree.writeRetentionQueue.capacity=4000
com.bigdata.btree.BTree.branchingFactor=128

# HTTP server settings
jetty.port=9999
jetty.resourceBase=/opt/blazegraph/war

# Logging
log4j.rootCategory=WARN, console
log4j.appender.console=org.apache.log4j.ConsoleAppender
log4j.appender.console.layout=org.apache.log4j.PatternLayout
log4j.appender.console.layout.ConversionPattern=%d{ISO8601} [%t] %-5p %c - %m%n
