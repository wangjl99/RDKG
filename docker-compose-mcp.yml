services:

  # ── Neo4j graph database ─────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.15-community
    container_name: rdkg_neo4j
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-rdkg_secret}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./data:/var/lib/neo4j/import
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Apache Jena Fuseki SPARQL endpoint ────────────────────────────────────
  fuseki:
    image: stain/jena-fuseki:latest
    container_name: rdkg_fuseki
    ports:
      - "3030:3030"
    environment:
      ADMIN_PASSWORD: ${FUSEKI_PASSWORD:-rdkg_secret}
    volumes:
      - fuseki_data:/fuseki
    restart: unless-stopped

  # ── FastAPI REST layer ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: rdkg_api
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-rdkg_secret}
      SPARQL_ENDPOINT: http://fuseki:3030/rdkg/sparql
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  fuseki_data:
